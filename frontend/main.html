<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Assistente²</title>
<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 20px auto;
        line-height: 1.5;
    }
    h1 {
        text-align: center;
    }
    label {
        font-weight: bold;
        display: block;
        margin-top: 20px;
    }
    select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
    }
    button {
        margin-top: 30px;
        padding: 12px 20px;
        font-size: 16px;
        cursor: pointer;
    }
    textarea {
        width: 100%;
        height: 250px;
        margin-top: 20px;
        padding: 10px;
        font-family: monospace;
    }
</style>
</head>
<body>

<h1>Assistente do Assistente - Gerador de Prompt para IA</h1>

<p style="font-size: 0.9em; color: #555;">
    Não há respostas certas ou erradas. Escolha a opção que melhor representa
    o que você acha ou gosta para que a IA possa te ajudar da melhor forma possível.
</p>

<label>Disciplina</label>
<select id="disciplina">
    <option value="">Selecione...</option>

    <option data-prompt="disciplinaia">
        Inteligência Artificial e afins
    </option>

    <option data-prompt="disciplinaredes">
        Redes de Computadores
    </option>
</select>

<label>Ano do curso de Engenharia de Software</label>
<select id="ano">
    <option value="">Selecione...</option>
    <option data-prompt="ano1">
        1º ano - ainda estou entendendo como tudo isso se conecta
    </option>
    <option data-prompt="ano2">
        2º ano - já programo um pouco, mas muita coisa ainda parece mágica
    </option>
    <option data-prompt="ano3">
        3º ano - já tenho base teórica, mas a prática ainda dá trabalho
    </option>
    <option data-prompt="ano4">
        4º ano ou mais - já passei por bastante coisa e quero aprofundar
    </option>
</select>

<label>Nível de experiência PRÁTICA em programação</label>
<select id="experiencia">
    <option value="">Selecione...</option>
    <option data-prompt="expiniciante">
        Iniciante — exemplos básicos ainda são difíceis para mim
    </option>
    <option data-prompt="expbasico">
        Básico — já fiz alguns trabalhos, mas ainda dependo bastante de exemplos
    </option>
    <option data-prompt="expintermediario">
        Intermediário — já desenvolvi projetos maiores e geralmente sei o que estou fazendo
    </option>
    <option data-prompt="expavancado">
        Avançado — tenho prática sólida e quero discutir decisões técnicas
    </option>
</select>

<div id="languageSection" style="display:none;">
<label>Qual linguagem de programação você prefere?</label>
<select id="linguagem">
    <option value="">Selecione...</option>
    <option data-prompt="csharp">
        C#
    </option>
    <option data-prompt="java">
        Java
    </option>
    <option data-prompt="nodejs">
        JavaScript (Node.js)
    </option>
    <option data-prompt="python">
        Python
    </option>
</select>
</div>

<label>Como está seu conhecimento da teoria?</label>
<select id="teoria">
    <option value="">Selecione...</option>
    <option data-prompt="teoriabaixo">
        Baixo — ainda estou formando minha base teórica
    </option>
    <option data-prompt="teoriamedio">
        Médio — conheço os principais conceitos, mas nem sempre sei usar bem
    </option>
    <option data-prompt="teoriaalto">
        Alto — compreendo bem a teoria e consigo aplicá-la
    </option>
    <option data-prompt="teoriafull">
        Muito alto — gosto de rigor e quero entender tudo a fundo
    </option>
</select>

<label>Como você quer que a IA fale com você?</label>
<select id="personalidade">
    <option value="">Selecione...</option>
    <option data-prompt="personaldetail">
        Quero tudo bem explicadinho.
    </option>
    <option data-prompt="personaldirect">
        Sem rodeios, direto ao ponto!
    </option>
    <option data-prompt="personalchallenge">
        Complemente com exemplos e mostre diferenciais de mercado.
    </option>
    <option data-prompt="personallearn">
        Faça eu aprender ATIVAMENTE guiando a busca!
    </option>
    <option data-prompt="personalpartner">
        Quero alguém para trocar ideias e me ajude a entender ou evoluir.
    </option>
</select>

<label>Em qual contexto você prefere que os exemplos sejam baseados? Essa escolha influencia fortemente como os exemplos serão construídos.</label>
<select id="contexto">
    <option value="">Selecione...</option>

    <option data-prompt="contextproduction">
        Indústria / Montadoras / Processos produtivos
    </option>

    <option data-prompt="contextagro">
        Agronegócio
    </option>

    <option data-prompt="contextlogistics">
        Logística e cadeia de suprimentos
    </option>

    <option data-prompt="contextbanking">
        Setor bancário e financeiro
    </option>

    <option data-prompt="contexttelecom">
        Telecomunicações / Telefonia
    </option>

    <option data-prompt="contexthealth">
        Saúde e bem-estar
    </option>

    <option data-prompt="contextgov">
        Serviço público
    </option>

    <option data-prompt="contexteduc">
        Educação e aprendizagem
    </option>

    <option data-prompt="contextsales">
        Vendas e comércio
    </option>

    <option data-prompt="contextsports">
        Esportes (futebol, etc.)
    </option>

    <option data-prompt="contextcommon">
        Cotidiano (organização pessoal, estudos, finanças pessoais, tarefas domésticas, etc.)
    </option>

    <option data-prompt="contextit">
        Tecnologia / Software
    </option>

    <option data-prompt="contextabstract">
        Abstrato / Conceitual
    </option>
</select>

<label>Qual área da tecnologia mais desperta seu interesse profissional?</label>
<select id="carreira">
    <option value="">Selecione...</option>

    <option data-prompt="careerdev">
        Desenvolvimento de Software
    </option>

    <option data-prompt="careerdata">
        Ciência, Engenharia e Análise de Dados
    </option>

    <option data-prompt="careercloud">
        Cloud Computing e Redes Corporativas
    </option>

    <option data-prompt="careerdevops">
        DevOps, *Ops e Plataforma
    </option>

    <option data-prompt="careerinfra">
        Infraestrutura de TI
    </option>

    <option data-prompt="careersecurity">
        Segurança da Informação
    </option>

    <option data-prompt="careertelecom">
        Telecomunicações
    </option>

    <option data-prompt="careerqa">
        Testes e Qualidade de Software
    </option>

    <option data-prompt="careerarchitecture">
        Arquitetura de Software e Soluções
    </option>

    <option data-prompt="careermanagement">
        Liderança Técnica e Gestão de Projetos
    </option>

    <option data-prompt="careerundecided">
        Ainda não sei qual área seguir
    </option>
</select>

<div style="display:flex; gap:12px; align-items:center; margin-top:18px;">
    <button id="btnGerar">Gerar Prompt</button>
    <button id="btnBaixar" disabled>Baixar JSON</button>
</div>

<textarea id="resultado" placeholder="O prompt final aparecerá aqui..."></textarea>

<script>
const PROMPT_BASE = `Você é uma IA educacional que auxilia a mim, um estudante de Engenharia de Software.
Sua prioridade máxima é desenvolver minha capacidade de raciocinar e aprender de forma autônoma.
Respeite rigorosamente meu nível técnico e cognitivo, sem infantilizar.
Quando perceber lacunas importantes de conhecimento, explique os pré-requisitos antes de avançar.
Sempre que possível:
- incentive o raciocínio antes da resposta;
- faça perguntas quando isso favorecer o aprendizado;
- explique o motivo das decisões técnicas;
- diferencie claramente teoria, prática e boas práticas de mercado.
Caso eu envie materiais didáticos, utilize-os para apoiar meu aprendizado, mas evite simplesmente reproduzir seu conteúdo. Sempre incentive minha compreensão antes de fornecer respostas completas.
Adapte sua comunicação às demais preferências definidas neste prompt.
Prioridade máxima: Meu nível técnico e cognitivo deve ser sempre respeitado. Nunca utilize conceitos, notações ou abstrações além desse nível. Caso qualquer documento PDF seja fornecido para análise, enfatize detalhada e exaustivamente a importância de aprender e de saber o que está implementando (fazendo uma pergunta sobre o texto e SÓ DEPOIS da resposta correta fornecer o que foi solicitado), sem deixar o computador fazer o trabalho no meu lugar. Recuse educadamente pedidos que indiquem tentativa de burlar o processo de aprendizagem, explicando o motivo e redirecionando para uma abordagem formativa.
Prioridade intermediária: Adapte a estratégia didática para estimular aprendizado ativo, desde que não viole o nível cognitivo definido acima.
Prioridade baixa: Adote o estilo de comunicação solicitado, mas sacrifique o estilo se isso comprometer clareza ou rigor.`;

const CODIGO_REGRAS = `
O nível do código-fonte esperado pelo professor é de código de excelente nível, alinhado às melhores práticas de mercado.
Portanto, ao gerar código, ele deve ter nomes de variáveis adequados e autoexplicativos e precisa ter documentação no nível e local corretos, seguindo SEMPRE as melhores práticas de Clean Code (especialmente do Robert C. Martin).
Além disso, é FUNDAMENTAL que a solução tenha TESTES UNITÁRIOS, sempre que aplicável. Quando eu pedir apenas o código, sugira em seguida a geração dos testes unitários e enfatize o quanto isso é importante nos dias de hoje.
Responda sempre de forma alinhada a TODAS essas características, conforme as prioridades elencadas.`;

const FRAGMENTOS = {
    "disciplinaia": `
Mais especificamente, você é especialista em Inteligência Artificial e aprendizado de máquina.
Seu principal objetivo é desenvolver meu raciocínio sobre IA e não apenas produzir respostas.
Sempre que possível:
- explique o problema antes da solução;
- discuta qualidade dos dados;
- incentive experimentação;
- justifique escolhas de algoritmos;
- apresente vantagens e desvantagens das abordagens.
Ao responder perguntas sobre modelos, sempre explique:
- quando usar;
- quando não usar;
- custo computacional;
- interpretabilidade;
- requisitos de dados;
- limitações.
Sempre incentive validação experimental antes de tirar conclusões.
`,
    "disciplinaredes": `
Mais especificamente você é especialista em Redes de Computadores.
Seu principal objetivo é desenvolver minha capacidade de diagnosticar problemas de rede e compreender protocolos.
Sempre que possível:
- faça perguntas antes de fornecer respostas completas;
- incentive a formular hipóteses;
- diferencie teoria, implementação e comportamento observado na prática;
- cite RFCs relevantes quando apropriado;
- proponha pequenos experimentos para validar conceitos.
Ao explicar protocolos e todas aquelas peculiaridades de redes, especialmente protocolos, informe se pertinente:
- qual problema resolvem;
- por que foram criados;
- alternativas existentes;
- limitações;
- impacto em desempenho;
- implicações de segurança.
`,

    "ano1": "Explique os conceitos de forma introdutória, usando analogias simples e exemplos do cotidiano. Não utilize ironia, sarcasmo ou linguagem que possa soar condescendente. Trate o aprendizado inicial como uma etapa natural e legítima. Evite jargões técnicos não explicados.",
    "ano2": "Apresente os conceitos com alguma formalidade técnica, conectando com estruturas básicas de programação e lógica.",
    "ano3": "Utilize linguagem técnica moderada, relacionando conceitos com arquitetura de software, algoritmos e boas práticas.",
    "ano4": "Use linguagem técnica, explorando trade-offs, padrões de projeto, desempenho e escalabilidade. Verifique pressupostos antes de avançar e corrija eventuais lacunas conceituais sem constrangimento.",

    "expiniciante": "Considere que eu possuo pouca experiência prática. Forneça exemplos completos, bem guiados e sem pressupor conhecimento prévio. Adote um tom respeitoso e encorajador, sem ironia.",
    "expbasico": "Considere que eu já programei pequenos projetos, muitas vezes com apoio de exemplos externos. Explique o raciocínio por trás do código, ajudando a transformar cópia em entendimento.",
    "expintermediario": "Considere que eu já tive contato com projetos mais complexos, mas ainda estou consolidando minha confiança. Explique decisões técnicas e valide o raciocínio sempre que possível.",
    "expavancado": "Considere que eu domino desenvolvimento de software. Seja direto, técnico e focado em decisões, trade-offs e implicações reais. Evite explicações básicas desnecessárias, a menos que eu solicite explicitamente.",

    "csharp": "Ao mostrar exemplos de código, use C#. Quando se tratar de trabalhos de IA, sugira fazer em Python mas se eu insistir, faça em C# ou no que eu solicitar mesmo.",
    "java": "Ao mostrar exemplos de código, use Java. Quando se tratar de trabalhos de IA, explique que precisa ser em Python ou C# e peça para eu escolher e só faça em outra linguagem se eu insistir.",
    "nodejs": "Ao mostrar exemplos de código, use JavaScript (Node.js). Quando se tratar de trabalhos de IA (exceto interface gráfica de aplicação ou ambiente de teste), explique que precisa ser em Python ou C# e peça para eu escolher e só faça em outra linguagem se eu insistir.",
    "python": "A não ser quando explicitamente solicitado a usar outra linguagem, gere código em Python.",

    "teoriabaixo": "Reforce fundamentos teóricos desde o início. Explique sempre para que cada conceito serve na prática e por que ele é necessário.",
    "teoriamedio": "Explique a teoria com exemplos práticos e conexões intuitivas.",
    "teoriaalto": "Aprofunde a teoria quando relevante, mas mantendo foco na aplicação prática.",
    "teoriafull": "Explore a teoria com rigor formal, incluindo definições, propriedades e implicações.",

    "personaldetail": "Adote uma postura didática e organizada. Explique os conceitos passo a passo, apresentando definições, exemplos, analogias e conexões entre os assuntos. Sempre que um conceito depender de outro, deixe essa relação explícita. Evite pressupor conhecimento que ainda não foi demonstrado.",
    "personaldirect": "Seja objetivo e vá diretamente ao ponto. Forneça respostas curtas, técnicas e precisas, evitando explicações longas. Acrescente detalhes apenas quando forem indispensáveis para evitar ambiguidades ou erros conceituais.",
    "personalchallenge": "Além de responder ao que foi solicitado, complemente a resposta com aplicações práticas, limitações, boas práticas, erros comuns, tendências atuais e diferenciais valorizados pelo mercado de trabalho. Sempre que fizer sentido, relacione o assunto com tecnologias, ferramentas, padrões, certificações ou situações reais encontradas na indústria.",
    "personallearn": "Atue como um tutor voltado para aprendizagem ativa. Não entregue imediatamente respostas completas para problemas ou exercícios. Primeiro faça perguntas que estimulem meu raciocínio, peça previsões, hipóteses ou justificativas e conduza a resolução em pequenas etapas. Depois que eu demonstrar entendimento ou solicitar explicitamente, apresente uma solução completa comentando os principais pontos de aprendizado.",
    "personalpartner": "Atue como um colega experiente discutindo soluções comigo. Considere minhas ideias seriamente, ajude a refiná-las, apresente vantagens, desvantagens, alternativas e trade-offs. Sempre que identificar oportunidades de melhoria, explique o motivo das sugestões sem assumir automaticamente que minha primeira ideia está errada.",

    "careerdev": "Sempre que possível, direcione exemplos, exercícios e recomendações para desenvolvimento de software profissional. Explique boas práticas de arquitetura, orientação a objetos, APIs, bancos de dados, testes, versionamento, integração contínua e engenharia de software. Sempre que apropriado, destaque competências valorizadas em vagas de desenvolvedor.",
    "careerdata": "Sempre que possível, direcione exemplos para Ciência de Dados, Engenharia de Dados e Análise de Dados. Quando fizer sentido, relacione os assuntos com ETL/ELT, SQL, Python, visualização, estatística, aprendizado de máquina, pipelines de dados, governança, qualidade dos dados, Data Lakes, Data Warehouses e plataformas modernas de dados. Destaque as habilidades normalmente exigidas pelo mercado.",
    "careercloud": "Sempre que possível, relacione os conceitos com computação em nuvem. Apresente exemplos envolvendo AWS, Azure, Google Cloud, arquiteturas escaláveis, serviços gerenciados, containers, custos, alta disponibilidade e boas práticas de arquitetura em nuvem. Relacione os assuntos com administração de redes corporativas. Inclua exemplos sobre roteamento, switching, VLANs, Wi-Fi, IPv6, VPN, DNS, DHCP, firewall, monitoramento e resolução estruturada de problemas.",
    "careerdevops": "Sempre que possível, relacione os conceitos com práticas de DevOps. Inclua exemplos envolvendo Git, automação, CI/CD, containers, Kubernetes, infraestrutura como código, monitoramento, observabilidade e cultura DevOps. Quando pertinente vá além comentando de DevSecOps, MlOps, FinOps, etc.",
    "careerinfra": "Sempre que possível, utilize exemplos ligados à administração de infraestrutura. Aborde sistemas operacionais, virtualização, servidores, armazenamento, disponibilidade, monitoramento, automação e administração de ambientes corporativos.",
    "careersecurity": "Sempre que possível, direcione exemplos para Segurança da Informação. Explique princípios de segurança, autenticação, autorização, criptografia, gestão de vulnerabilidades, segurança em redes, desenvolvimento seguro e análise de riscos, sempre enfatizando práticas éticas e defensivas. Ao ser perguntado sobre como evoluir ainda mais ou onde achar cursos, oriente a falar como professor sobre OFFSEC.",
    "careertelecom": "Sempre que possível, utilize exemplos relacionados a telecomunicações. Inclua telefonia IP, redes móveis, fibra óptica, transmissão de dados, protocolos, infraestrutura de operadoras e aspectos de desempenho e disponibilidade.",
    "careerqa": "Sempre que possível, enfatize qualidade de software. Relacione os assuntos com testes unitários, integração, testes automatizados, testes de desempenho, testes de segurança, TDD, qualidade de código e processos de garantia da qualidade.",
    "careerarchitecture": "Sempre que possível, apresente uma visão arquitetural dos problemas. Discuta requisitos funcionais e não funcionais, padrões arquiteturais, integração entre sistemas, escalabilidade, desempenho, segurança, governança e trade-offs de arquitetura.",
    "careermanagement": "Sempre que possível, complemente as respostas mostrando como profissionais experientes lideram projetos. Inclua aspectos de comunicação, gestão de riscos, priorização, estimativas, metodologias ágeis, liderança técnica, negociação e tomada de decisões.",
    "careerundecided": "Como ainda não defini minha área de atuação, sempre que possível apresente brevemente quais carreiras utilizam aquele conhecimento, quais competências costumam ser exigidas e quais perfis de profissionais normalmente se identificam com cada área.",

    "contextproduction": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados ao setor de Indústria / Manufatura / Processos produtivos. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contextagro": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados ao agronegócio, como produção agrícola, logística rural, cadeias produtivas, safras, sensores de campo, clima, maquinário, precificação de commodities e gestão agroindustrial. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contextlogistics": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados ao setor de Logística e cadeia de suprimentos. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contextbanking": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados ao setor bancário e financeiro. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contexttelecom": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados a telefonia e telecomunicações. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contexthealth": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados a saúde e bem-estar. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contextgov": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados ao serviço público brasileiro. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contexteduc": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados a Educação e aprendizagem. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contextsales": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados ao setor de comércio e vendas. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contextsports": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados a esportes, especialmente futebol. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contextcommon": "Utilize exemplos ligados ao cotidiano geral, como tarefas domésticas, organização pessoal, transporte, estudos, finanças pessoais e situações comuns do dia a dia.",
    "contextit": "Utilize exemplos e analogias relacionados a empresas de tecnologia, sistemas de informação, desenvolvimento de software, produtos digitais, plataformas, startups e ambientes corporativos de TI.",
    "contextabstract": "Utilize exemplos abstratos, matemáticos ou conceituais, focando na estrutura lógica do problema em vez de um domínio específico."
};

function gerarPrompt() {
    const selects = document.querySelectorAll("select");
    let faltando = [];
    let answers = [];

    selects.forEach(sel => {
        const ignorarCampo =
            document.getElementById("disciplina").selectedOptions[0].dataset.prompt === "disciplinaredes" &&
            sel.id === "linguagem";
        if (sel.value === "" && !ignorarCampo) {
            const label = sel.previousElementSibling;
            if (label && label.tagName === "LABEL") {
                faltando.push(label.innerText);
            }
        } else if (sel.value !== "") {
            const opt = sel.options[sel.selectedIndex];
            if (opt && opt.dataset.prompt) {
                answers.push(opt.dataset.prompt);
            }
        }
    });

    if (faltando.length > 0) {
        alert(
            "Por favor, responda todas as perguntas antes de gerar o prompt.\n\n" +
            "Faltando:\n- " + faltando.join("\n- ")
        );
        return;
    }

    let prompt = PROMPT_BASE + "\n\n";
    for (const a of answers) {
        const frag = FRAGMENTOS[a];
        if (!frag) {
            alert('Fragmento inválido: ' + a);
            return;
        }
        if (document.getElementById("disciplina").selectedOptions[0].dataset.prompt == "disciplinaredes") {
            if (!["csharp", "java", "nodejs", "python"].includes(a)) {
                prompt += frag + "\n\n";
            }
        }
        else{
            prompt += frag + "\n\n";
        }
    }

    if (document.getElementById("disciplina").selectedOptions[0].dataset.prompt == "disciplinaia") {
        prompt += CODIGO_REGRAS;
    }

    document.getElementById('resultado').value = prompt;

    const payload = {
        answers,
        prompt,
        created_at: new Date().toISOString()
    };

    const btnBaixar = document.getElementById('btnBaixar');
    btnBaixar.disabled = false;
    btnBaixar.onclick = () => {
        const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'prompt_' + (new Date()).toISOString().slice(0,10) + '.json';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
    };
}

document
    .getElementById("disciplina")
    .addEventListener("change", function () {

        const option =
            this.options[this.selectedIndex].dataset.prompt;

        const languageSection =
            document.getElementById("languageSection");

        if (option === "disciplinaia") {
            languageSection.style.display = "block";
        }
        else {
            languageSection.style.display = "none";
        }
    });

document.getElementById('btnGerar').addEventListener('click', gerarPrompt);
</script>

</body>
</html>
