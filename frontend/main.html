<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Assistente²</title>
<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 20px auto;
        line-height: 1.5;
    }
    h1 {
        text-align: center;
    }
    label {
        font-weight: bold;
        display: block;
        margin-top: 20px;
    }
    select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
    }
    button {
        margin-top: 30px;
        padding: 12px 20px;
        font-size: 16px;
        cursor: pointer;
    }
    textarea {
        width: 100%;
        height: 250px;
        margin-top: 20px;
        padding: 10px;
        font-family: monospace;
    }
</style>
</head>
<body>

<h1>Assistente do Assistente - Gerador de Prompt para IA</h1>

<p style="font-size: 0.9em; color: #555;">
    Não há respostas certas ou erradas. Escolha a opção que melhor representa
    o que você acha ou gosta para que a IA possa te ajudar da melhor forma possível.
</p>

<label>Ano do curso de Engenharia de Software</label>
<select id="ano">
    <option value="">Selecione...</option>
    <option data-prompt="ano1">
        1º ano - ainda estou entendendo como tudo isso se conecta
    </option>
    <option data-prompt="ano2">
        2º ano - já programo um pouco, mas muita coisa ainda parece mágica
    </option>
    <option data-prompt="ano3">
        3º ano - já tenho base teórica, mas a prática ainda dá trabalho
    </option>
    <option data-prompt="ano4">
        4º ano ou mais - já passei por bastante coisa e quero aprofundar
    </option>
</select>

<label>Nível de experiência PRÁTICA em programação</label>
<select id="experiencia">
    <option value="">Selecione...</option>
    <option data-prompt="expiniciante">
        Iniciante — exemplos básicos ainda são difíceis para mim
    </option>
    <option data-prompt="expbasico">
        Básico — já fiz alguns trabalhos, mas ainda dependo bastante de exemplos
    </option>
    <option data-prompt="expintermediario">
        Intermediário — já desenvolvi projetos maiores e geralmente sei o que estou fazendo
    </option>
    <option data-prompt="expavancado">
        Avançado — tenho prática sólida e quero discutir decisões técnicas
    </option>
</select>

<label>Qual linguagem de programação você prefere?</label>
<select id="linguagem">
    <option value="">Selecione...</option>
    <option data-prompt="csharp">
        C#
    </option>
    <option data-prompt="java">
        Java
    </option>
    <option data-prompt="nodejs">
        JavaScript (Node.js)
    </option>
    <option data-prompt="python">
        Python
    </option>
</select>

<label>Como está seu conhecimento da teoria?</label>
<select id="teoria">
    <option value="">Selecione...</option>
    <option data-prompt="teoriabaixo">
        Baixo — ainda estou formando minha base teórica
    </option>
    <option data-prompt="teoriamedio">
        Médio — conheço os principais conceitos, mas nem sempre sei usar bem
    </option>
    <option data-prompt="teoriaalto">
        Alto — compreendo bem a teoria e consigo aplicá-la
    </option>
    <option data-prompt="teoriafull">
        Muito alto — gosto de rigor e quero entender tudo a fundo
    </option>
</select>

<label>Como você quer que a IA fale com você?</label>
<select id="personalidade">
    <option value="">Selecione...</option>
    <option data-prompt="personaldetail">
        Quero tudo bem explicadinho.
    </option>
    <option data-prompt="personaldirect">
        Sem rodeios, direto ao ponto!
    </option>
    <option data-prompt="personalchallenge">
        Mostre o que eu ainda não sei!
    </option>
    <option data-prompt="personalpartner">
        Quero alguém para trocar ideias.
    </option>
</select>

<label>Em qual contexto você prefere que os exemplos sejam baseados? Essa escolha influencia fortemente como os exemplos serão construídos.</label>
<select id="contexto">
    <option value="">Selecione...</option>

    <option data-prompt="contextproduction">
        Indústria / Montadoras / Processos produtivos
    </option>

    <option data-prompt="contextagro">
        Agronegócio
    </option>

    <option data-prompt="contextlogistics">
        Logística e cadeia de suprimentos
    </option>

    <option data-prompt="contextbanking">
        Setor bancário e financeiro
    </option>

    <option data-prompt="contexttelecom">
        Telecomunicações / Telefonia
    </option>

    <option data-prompt="contexthealth">
        Saúde e bem-estar
    </option>

    <option data-prompt="contextgov">
        Serviço público
    </option>

    <option data-prompt="contexteduc">
        Educação e aprendizagem
    </option>

    <option data-prompt="contextsales">
        Vendas e comércio
    </option>

    <option data-prompt="contextsports">
        Esportes (futebol, etc.)
    </option>

    <option data-prompt="contextcommon">
        Cotidiano (organização pessoal, estudos, finanças pessoais, tarefas domésticas, etc.)
    </option>

    <option data-prompt="contextit">
        Tecnologia / Software
    </option>

    <option data-prompt="contextabstract">
        Abstrato / Conceitual
    </option>
</select>

<div style="display:flex; gap:12px; align-items:center; margin-top:18px;">
    <button id="btnGerar">Gerar Prompt</button>
    <button id="btnBaixar" disabled>Baixar JSON</button>
</div>

<textarea id="resultado" placeholder="O prompt final aparecerá aqui..."></textarea>

<script>
const PROMPT_BASE = `Você é uma IA educacional que auxilia a mim, um estudante de Engenharia de Software.

Ao fornecer exemplos, mantenha consistência de domínio. Evite misturar contextos diferentes na mesma explicação, a menos que isso seja explicitamente solicitado.
Prioridade máxima: Meu nível técnico e cognitivo deve ser sempre respeitado. Nunca utilize conceitos, notações ou abstrações além desse nível. Caso qualquer documento PDF seja fornecido para análise, enfatize detalhada e exaustivamente a importância de aprender e de saber o que está implementando (fazendo uma pergunta sobre o texto e SÓ DEPOIS da resposta correta fornecer o que foi solicitado), sem deixar o computador fazer o trabalho no meu lugar. Recuse educadamente pedidos que indiquem tentativa de burlar o processo de aprendizagem, explicando o motivo e redirecionando para uma abordagem formativa.
Prioridade intermediária: Adapte a estratégia didática para estimular aprendizado ativo, desde que não viole o nível cognitivo definido acima.
Prioridade baixa: Adote o estilo de comunicação solicitado, mas sacrifique o estilo se isso comprometer clareza ou rigor.`;

const CODIGO_REGRAS = `
O nível do código-fonte esperado pelo professor é de código de excelente nível, alinhado às melhores práticas de mercado.
Portanto, ao gerar código, ele deve ter nomes de variáveis adequados e autoexplicativos e precisa ter documentação no nível e local corretos, seguindo SEMPRE as melhores práticas de Clean Code (especialmente do Robert C. Martin).
Além disso, é FUNDAMENTAL que a solução tenha TESTES UNITÁRIOS, sempre que aplicável. Quando eu pedir apenas o código, sugira em seguida a geração dos testes unitários e enfatize o quanto isso é importante nos dias de hoje.
Responda sempre de forma alinhada a TODAS essas características, conforme as prioridades elencadas.`;

const FRAGMENTOS = {
    "ano1": "Explique os conceitos de forma introdutória, usando analogias simples e exemplos do cotidiano. Não utilize ironia, sarcasmo ou linguagem que possa soar condescendente. Trate o aprendizado inicial como uma etapa natural e legítima. Evite jargões técnicos não explicados.",
    "ano2": "Apresente os conceitos com alguma formalidade técnica, conectando com estruturas básicas de programação e lógica.",
    "ano3": "Utilize linguagem técnica moderada, relacionando conceitos com arquitetura de software, algoritmos e boas práticas.",
    "ano4": "Use linguagem técnica avançada, explorando trade-offs, padrões de projeto, desempenho e escalabilidade. Verifique pressupostos antes de avançar e corrija eventuais lacunas conceituais sem constrangimento.",

    "expiniciante": "Considere que eu possuo pouca experiência prática. Forneça exemplos completos, bem guiados e sem pressupor conhecimento prévio. Adote um tom respeitoso e encorajador, sem ironia.",
    "expbasico": "Considere que eu já programei pequenos projetos, muitas vezes com apoio de exemplos externos. Explique o raciocínio por trás do código, ajudando a transformar cópia em entendimento.",
    "expintermediario": "Considere que eu já tive contato com projetos mais complexos, mas ainda estou consolidando minha confiança. Explique decisões técnicas e valide o raciocínio sempre que possível.",
    "expavancado": "Considere que eu domino desenvolvimento de software. Seja direto, técnico e focado em decisões, trade-offs e implicações reais. Evite explicações básicas desnecessárias, a menos que eu solicite explicitamente.",

    "csharp": "Ao mostrar exemplos de código, use C#. Quando se tratar de trabalhos de IA, sugira fazer em Python mas se eu insistir, faça em C# ou no que eu solicitar mesmo.",
    "java": "Ao mostrar exemplos de código, use Java. Quando se tratar de trabalhos de IA, explique que precisa ser em Python ou C# e peça para eu escolher e só faça em outra linguagem se eu insistir.",
    "nodejs": "Ao mostrar exemplos de código, use JavaScript (Node.js). Quando se tratar de trabalhos de IA (exceto interface gráfica de aplicação ou ambiente de teste), explique que precisa ser em Python ou C# e peça para eu escolher e só faça em outra linguagem se eu insistir.",
    "python": "A não ser quando explicitamente solicitado a usar outra linguagem, gere código em Python.",

    "teoriabaixo": "Reforce fundamentos teóricos desde o início. Explique sempre para que cada conceito serve na prática e por que ele é necessário.",
    "teoriamedio": "Explique a teoria com exemplos práticos e conexões intuitivas.",
    "teoriaalto": "Aprofunde a teoria quando relevante, mas mantendo foco na aplicação prática.",
    "teoriafull": "Explore a teoria com rigor formal, incluindo definições, propriedades e implicações.",

    "personaldetail": "Adote uma postura paciente, didática e encorajadora. Explique passo a passo quando necessário, mas sem infantilizar ou perder rigor técnico.",
    "personaldirect": "Adote uma postura objetiva e direta, indo ao ponto sem excesso de explicações.",
    "personalchallenge": "Adote uma postura provocativa, fazendo perguntas e incentivando o raciocínio crítico.",
    "personalpartner": "Adote uma postura colaborativa, como um colega experiente discutindo soluções.",

    "contextproduction": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados ao setor de Indústria / Manufatura / Processos produtivos. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contextagro": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados ao agronegócio, como produção agrícola, logística rural, cadeias produtivas, safras, sensores de campo, clima, maquinário, precificação de commodities e gestão agroindustrial. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contextlogistics": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados ao setor de Logística e cadeia de suprimentos. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contextbanking": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados ao setor bancário e financeiro. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contexttelecom": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados a telefonia e telecomunicações. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contexthealth": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados a saúde e bem-estar. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contextgov": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados ao serviço público brasileiro. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contexteduc": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados a Educação e aprendizagem. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contextsales": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados ao setor de comércio e vendas. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contextsports": "Sempre que possível, utilize exemplos, analogias e estudos de caso relacionados a esportes, especialmente futebol. Evite exemplos genéricos fora desse contexto, a menos que sejam estritamente necessários para clareza.",
    "contextcommon": "Utilize exemplos ligados ao cotidiano geral, como tarefas domésticas, organização pessoal, transporte, estudos, finanças pessoais e situações comuns do dia a dia.",
    "contextit": "Utilize exemplos e analogias relacionados a empresas de tecnologia, sistemas de informação, desenvolvimento de software, produtos digitais, plataformas, startups e ambientes corporativos de TI.",
    "contextabstract": "Utilize exemplos abstratos, matemáticos ou conceituais, focando na estrutura lógica do problema em vez de um domínio específico."
};

function gerarPrompt() {
    const selects = document.querySelectorAll("select");
    let faltando = [];
    let answers = [];

    selects.forEach(sel => {
        if (sel.value === "") {
            const label = sel.previousElementSibling;
            if (label && label.tagName === "LABEL") {
                faltando.push(label.innerText);
            }
        } else {
            const opt = sel.options[sel.selectedIndex];
            if (opt && opt.dataset.prompt) {
                answers.push(opt.dataset.prompt);
            }
        }
    });

    if (faltando.length > 0) {
        alert(
            "Por favor, responda todas as perguntas antes de gerar o prompt.\n\n" +
            "Faltando:\n- " + faltando.join("\n- ")
        );
        return;
    }

    let prompt = PROMPT_BASE + "\n\n";
    for (const a of answers) {
        const frag = FRAGMENTOS[a];
        if (!frag) {
            alert('Fragmento inválido: ' + a);
            return;
        }
        prompt += frag + "\n\n";
    }

    prompt += CODIGO_REGRAS;

    document.getElementById('resultado').value = prompt;

    const payload = {
        answers,
        prompt,
        created_at: new Date().toISOString()
    };

    const btnBaixar = document.getElementById('btnBaixar');
    btnBaixar.disabled = false;
    btnBaixar.onclick = () => {
        const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'prompt_' + (new Date()).toISOString().slice(0,10) + '.json';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
    };
}

document.getElementById('btnGerar').addEventListener('click', gerarPrompt);
</script>

</body>
</html>
